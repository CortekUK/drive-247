services:
  postgres:
    container_name: drive247_v2_postgres
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - drive247_v2_postgres_data:/var/lib/postgresql/data

  redis:
    container_name: drive247_v2_redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - drive247_v2_redis_data:/var/lib/redis/data

volumes:
  drive247_v2_postgres_data:
  drive247_v2_redis_data:
