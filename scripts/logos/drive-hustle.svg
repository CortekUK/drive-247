<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" width="680" height="200" role="img" aria-label="Drive Hustle">
  <defs>
    <linearGradient id="dh-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F1B33"/>
      <stop offset="1" stop-color="#0A0F1C"/>
    </linearGradient>
    <linearGradient id="dh-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="1" y="1" width="678" height="198" rx="26" fill="url(#dh-bg)"/>
  <rect x="1.5" y="1.5" width="677" height="197" rx="25.5" fill="none" stroke="#3B82F6" stroke-opacity="0.28" stroke-width="1"/>

  <!-- monogram tile -->
  <rect x="42" y="50" width="100" height="100" rx="24" fill="url(#dh-tile)"/>
  <text x="92" y="100" font-family="'Helvetica Neue', Arial, sans-serif" font-size="50" font-weight="700"
        fill="#FFFFFF" text-anchor="middle" dominant-baseline="central" letter-spacing="1">DH</text>

  <!-- wordmark -->
  <text x="176" y="92" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700"
        fill="#F5F7FA" letter-spacing="2">DRIVE HUSTLE</text>
  <text x="178" y="134" font-family="'Helvetica Neue', Arial, sans-serif" font-size="21" font-weight="600"
        fill="#3B82F6" letter-spacing="11">CAR&#160;RENTALS</text>
</svg>
