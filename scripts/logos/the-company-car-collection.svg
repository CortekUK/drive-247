<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200" role="img" aria-label="The Company Car Collection">
  <defs>
    <linearGradient id="cc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17140C"/>
      <stop offset="1" stop-color="#0A0908"/>
    </linearGradient>
    <linearGradient id="cc-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EBD07A"/>
      <stop offset="1" stop-color="#C29A2A"/>
    </linearGradient>
    <linearGradient id="cc-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E6C868"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="1" y="1" width="718" height="198" rx="26" fill="url(#cc-bg)"/>
  <rect x="1.5" y="1.5" width="717" height="197" rx="25.5" fill="none" stroke="#D4AF37" stroke-opacity="0.35" stroke-width="1"/>

  <!-- monogram tile -->
  <rect x="42" y="50" width="100" height="100" rx="24" fill="url(#cc-tile)"/>
  <text x="92" y="100" font-family="'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="800"
        fill="#14110A" text-anchor="middle" dominant-baseline="central" letter-spacing="-1">CC</text>

  <!-- wordmark (two-line) -->
  <text x="176" y="90" font-family="'Helvetica Neue', Arial, sans-serif" font-size="37" font-weight="700"
        fill="#F5F1E6" letter-spacing="2">THE COMPANY CAR</text>
  <text x="178" y="132" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700"
        fill="url(#cc-gold)" letter-spacing="9">COLLECTION</text>
</svg>
