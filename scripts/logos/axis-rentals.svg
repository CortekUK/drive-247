<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 200" width="660" height="200" role="img" aria-label="Axis Rentals">
  <defs>
    <linearGradient id="ax-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12211A"/>
      <stop offset="1" stop-color="#0A0F0C"/>
    </linearGradient>
    <linearGradient id="ax-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#15803D"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="1" y="1" width="658" height="198" rx="26" fill="url(#ax-bg)"/>
  <rect x="1.5" y="1.5" width="657" height="197" rx="25.5" fill="none" stroke="#22C55E" stroke-opacity="0.30" stroke-width="1"/>

  <!-- monogram tile -->
  <rect x="42" y="50" width="100" height="100" rx="24" fill="url(#ax-tile)"/>
  <text x="92" y="100" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700"
        fill="#FFFFFF" text-anchor="middle" dominant-baseline="central" letter-spacing="1">AR</text>

  <!-- wordmark -->
  <text x="176" y="92" font-family="'Helvetica Neue', Arial, sans-serif" font-size="50" font-weight="700"
        fill="#F5F7F5" letter-spacing="3">AXIS RENTALS</text>
  <text x="178" y="134" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600"
        fill="#22C55E" letter-spacing="8">PREMIUM&#160;CAR&#160;RENTALS</text>
</svg>
