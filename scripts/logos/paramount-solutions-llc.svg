<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200" role="img" aria-label="Paramount Solutions LLC">
  <defs>
    <linearGradient id="ps-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17181C"/>
      <stop offset="1" stop-color="#0A0A0C"/>
    </linearGradient>
    <linearGradient id="ps-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26282E"/>
      <stop offset="1" stop-color="#0D0E11"/>
    </linearGradient>
    <linearGradient id="ps-silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F5F7"/>
      <stop offset="0.5" stop-color="#C6CAD1"/>
      <stop offset="1" stop-color="#9AA0A8"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="1" y="1" width="638" height="198" rx="26" fill="url(#ps-bg)"/>
  <rect x="1.5" y="1.5" width="637" height="197" rx="25.5" fill="none" stroke="#C8CCD2" stroke-opacity="0.22" stroke-width="1"/>

  <!-- monogram tile -->
  <rect x="42" y="50" width="100" height="100" rx="24" fill="url(#ps-tile)" stroke="#C8CCD2" stroke-opacity="0.28" stroke-width="1.5"/>
  <text x="92" y="100" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700"
        fill="url(#ps-silver)" text-anchor="middle" dominant-baseline="central" letter-spacing="1">PS</text>

  <!-- wordmark -->
  <text x="176" y="94" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700"
        fill="#F5F6F8" letter-spacing="3">PARAMOUNT</text>
  <text x="178" y="136" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="500"
        fill="#A9AEB6" letter-spacing="9">SOLUTIONS&#160;&#160;LLC</text>
</svg>
