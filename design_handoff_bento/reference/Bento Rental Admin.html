<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Drive247 · Bento Rental Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #efeef4; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
</style>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#6a4ff0"/>
    <rect x="20" y="20" width="34" height="60" rx="6" fill="#fff" opacity="0.95"/>
    <rect x="60" y="20" width="20" height="28" rx="5" fill="#fff" opacity="0.7"/>
    <rect x="60" y="52" width="20" height="28" rx="5" fill="#fff" opacity="0.7"/>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="bento-data.js"></script>
<script src="bento-theme.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="bento-shell.jsx"></script>
<script type="text/babel" src="bento-screens-1.jsx"></script>
<script type="text/babel" src="bento-screens-2.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const T = window.BENTO_THEMES;

const SCREENS = [
  { id: 'dashboard', active: 'dashboard', Comp: () => <window.BentoDashboard />,
    header: { eyebrowText: 'DB Car Rentals · Miami', title: 'Good morning, Daniel', subtitle: "Here's what's happening with your business today", showRange: true, cta: 'New rental' } },
  { id: 'rentals', active: 'rentals', Comp: () => <window.BentoRentals />,
    header: { eyebrowText: 'DB Car Rentals', title: 'Rentals', subtitle: '168 active · 7 due back today', cta: 'New rental' } },
  { id: 'fleet', active: 'fleet', Comp: () => <window.BentoFleet />,
    header: { eyebrowText: 'DB Car Rentals', title: 'Fleet', subtitle: '42 vehicles · 78% utilized', cta: 'Add vehicle' } },
  { id: 'customers', active: 'customers', Comp: () => <window.BentoCustomers />,
    header: { eyebrowText: 'DB Car Rentals', title: 'Customers', subtitle: '1,210 total · 38 new this month', cta: 'Add customer' } },
];

const W = 1320, H = 940;

function App() {
  return (
    <DesignCanvas>
      {SCREENS.map((s, i) => {
        const Comp = s.Comp;
        return (
          <DCSection key={s.id} id={s.id} title={`${i + 1} · ${s.id.charAt(0).toUpperCase() + s.id.slice(1)}`} subtitle="Bento · rental admin">
            <DCArtboard id={`${s.id}-light`} label="Light" width={W} height={H}>
              <window.BentoApp theme={T.light} active={s.active} header={s.header}><Comp /></window.BentoApp>
            </DCArtboard>
            <DCArtboard id={`${s.id}-dark`} label="Dark" width={W} height={H}>
              <window.BentoApp theme={T.dark} active={s.active} header={s.header}><Comp /></window.BentoApp>
            </DCArtboard>
          </DCSection>
        );
      })}
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
